<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BTS Greeting</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:'Inter',sans-serif;color:white;}
body{
background:radial-gradient(circle at 20% 30%, #5b21b6, transparent),
radial-gradient(circle at 80% 70%, #1e1b4b, transparent),
radial-gradient(circle at 50% 50%, #020617, black);
animation:galaxy 20s ease infinite alternate;
}
@keyframes galaxy{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(30deg)}}
body::after{
content:"";
position:fixed;
width:200%;
height:200%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:4px 4px;
opacity:.15;
animation:stars 120s linear infinite;
}
@keyframes stars{from{transform:translate(0,0)}to{transform:translate(-800px,-600px)}}

.container{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.name{font-family:'Playfair Display',serif;font-size:64px;letter-spacing:8px;transition:2s;text-shadow:0 0 30px rgba(168,85,247,.6);}
.fadeOut{opacity:0;filter:blur(10px);transform:translateY(-30px);}
button{margin-top:30px;padding:14px 40px;border-radius:40px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:white;cursor:pointer;backdrop-filter:blur(10px);}
#sentence{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);padding:30px 40px;border-radius:20px;background:rgba(255,255,255,.05);backdrop-filter:blur(10px);font-family:'Playfair Display',serif;font-size:28px;letter-spacing:.5px;opacity:0;transition:1.2s;text-align:center;max-width:70%;text-shadow:0 0 20px rgba(168,85,247,.7);}
.comment{position:absolute;font-size:13px;opacity:.5;animation:float 10s linear forwards;}
@keyframes float{from{transform:translateY(100px);opacity:0;}to{transform:translateY(-700px);opacity:.7;}}
.particle{position:absolute;width:3px;height:3px;background:white;border-radius:50%;}
#video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:3s;}
</style>
</head>
<body>

<video id="video" src="ending.mp4" playsinline></video>

<div class="container">
  <div class="name" id="name">AEPH</div>
  <button id="start">begin</button>
  <div id="sentence"></div>
</div>

<!-- Audio -->
<audio id="bg" src="Mikrokosmos.mp3" loop></audio>
<audio id="end" src="ForeverYoung.mp3"></audio>
<audio id="whisper" src="whisper.mp3"></audio>

<script>
const lines = [
  "You did well today.",
  "Don't be too hard on yourself.",
  "Jungkook: Even if you feel lost, you're still moving forward.",
  "Taehyung: I purple you. I trust you. I support you.",
  "Jimin: Remember, you're not alone right now.",
  "Suga: It's okay if you don't have a dream. Just be happy.",
  "RM: No matter who you are… speak yourself.",
  "Jin: Your presence alone brings happiness.",
  "J-Hope: You're doing better than you think.",
  "You are enough.",
  "You are loved.",
  "You matter.",
  "I'm proud of you."
];

document.getElementById("start").onclick = async () => {
  document.getElementById("start").style.display = "none";
  document.getElementById("name").classList.add("fadeOut");

  floating();

  // Play ForeverYoung immediately
  const endAudio = document.getElementById("end");
  endAudio.volume = 1;
  try { await endAudio.play(); } catch(e){ console.log("ForeverYoung blocked"); }

  let i = 0;
  showLine();

  function showLine() {
    if (i >= lines.length) {
      fireworksLogo();
      return;
    }
    type(lines[i], () => { i++; setTimeout(showLine, 1500); });
  }
};

// Typing effect
function type(text, done) {
  const el = document.getElementById("sentence");
  el.style.opacity = 1;
  el.innerHTML = "";
  let i = 0;
  const t = setInterval(() => {
    el.innerHTML += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(t);
      setTimeout(() => { el.style.opacity = 0; setTimeout(done, 900); }, 2200);
    }
  }, 35);
}

// Floating comments
function floating() {
  const msgs = ["borahae","ARMY loves you","you did well","I'm proud of you","stay strong","you're safe here","purple you"];
  setInterval(()=>{
    const c = document.createElement("div");
    c.className="comment";
    c.innerText = msgs[Math.floor(Math.random()*msgs.length)];
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.top="80%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),10000);
  },1200);
}

// Fireworks
function fireworksLogo() {
  const logo = [
    [0.42, 0.25],[0.38, 0.4],[0.35, 0.6],[0.40, 0.8],
    [0.58, 0.25],[0.62, 0.4],[0.65, 0.6],[0.60, 0.8]
  ];
  logo.forEach((p,i)=>{
    setTimeout(()=>{ explode(innerWidth*p[0], innerHeight*p[1]); }, i*200);
  });

  setTimeout(showVideo, 3500);
}

// Fireworks particle
function explode(x,y){
  for(let i=0;i<40;i++){
    const p=document.createElement("div");
    p.className="particle";
    document.body.appendChild(p);

    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*3;
    const dx=Math.cos(angle)*speed;
    const dy=Math.sin(angle)*speed;
    let life=0;

    function animate(){
      life++;
      p.style.left=(x+dx*life)+"px";
      p.style.top=(y+dy*life)+"px";
      p.style.opacity=1-life/25;
      if(life<25){ requestAnimationFrame(animate); } 
      else { p.remove(); }
    }
    animate();
  }
}

// Video + Mikrokosmos
async function showVideo() {
  const v = document.getElementById("video");
  v.style.opacity = 1;
  try { await v.play(); } catch(e){ v.muted = false; await v.play(); }

  // Play Mikrokosmos at low volume
  const bg = document.getElementById("bg");
  bg.volume = 0.25;
  try { await bg.play(); } catch(e){ console.log("Mikrokosmos blocked"); }

  // Whisper after 2s
  setTimeout(async ()=>{
    try { await document.getElementById("whisper").play(); } catch(e){ console.log("whisper blocked"); }
  }, 2000);
}
</script>
</body>
</html>
